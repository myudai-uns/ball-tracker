<html lang="ja">
<head>
<meta charset="UTF-8">

<title>SNS運用 ボールトラッカー</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;background:#fafafa;color:#1a1a2e;font-size:13px}
.page{padding:16px 20px}
h1{font-size:18px;font-weight:700;margin-bottom:2px}
.sub{font-size:12px;color:#888;margin-bottom:12px}
.toolbar{display:flex;gap:16px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.legend{display:flex;gap:14px;font-size:12px;align-items:center;flex-wrap:wrap}
.legend i{display:inline-block;width:12px;height:12px;border-radius:2px;vertical-align:middle;margin-right:3px}
.zctrl{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px}
.zctrl button{border:1px solid #ccc;background:#fff;border-radius:4px;padding:3px 10px;cursor:pointer;font-weight:700;color:#555}
.zctrl button:hover{background:#eee}
.zlabel{min-width:52px;text-align:center;font-weight:600;color:#555}

/* === CHART === */
.chart-wrap{border:1px solid #ddd;border-radius:8px;background:#fff;overflow:hidden}
.chart-scroll{overflow-x:auto;overflow-y:visible;position:relative}
table.gantt{border-collapse:collapse;table-layout:fixed}
table.gantt th,table.gantt td{padding:0;border:none;vertical-align:middle}

/* Left cols */
.col-name{width:220px;min-width:220px;position:sticky;left:0;z-index:6;background:#fff;border-right:1px solid #e0e0e0;padding:6px 10px !important;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-who{width:64px;min-width:64px;position:sticky;left:220px;z-index:6;background:#fff;border-right:1px solid #e0e0e0;text-align:center;padding:4px 2px !important}
thead .col-name,thead .col-who{background:#f7f7f7;z-index:8;font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
tbody tr:hover .col-name,tbody tr:hover .col-who{background:#f3f6ff}

.ptag{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;display:inline-block}
.pt-中谷{background:#dbeafe;color:#1d4ed8}
.pt-三上{background:#dcfce7;color:#15803d}
.pt-新山{background:#fef9c3;color:#a16207}
.pt-浅井{background:#f3e8ff;color:#7c3aed}
.pt-中谷→三上{background:#dbeafe;color:#1d4ed8}

.status{font-size:13px;float:right}

/* Timeline cell */
.tl-cell{height:32px;position:relative;border-left:1px solid #f0f0f0;padding:0 !important}
thead .tl-cell{height:28px;border-left:1px solid #ddd;font-size:10px;color:#999;text-align:center;line-height:28px;font-weight:600;overflow:hidden}
thead .tl-cell.day-start{border-left:2px solid #bbb;color:#555;font-size:11px;font-weight:700}

/* Category row */
.cat-row td{background:#f0f0f5;padding:4px 10px !important;font-size:11px;font-weight:700;color:#6366f1}

/* Bar */
.bar{position:absolute;height:18px;top:50%;transform:translateY(-50%);border-radius:3px;z-index:2;cursor:pointer;min-width:3px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bar:hover{filter:brightness(1.12);z-index:10}
.bar.team{background:#4285f4}
.bar.client{background:#ea4335}
.bar span{font-size:8px;color:rgba(255,255,255,.92);font-weight:700;padding:0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* End dot */
.edot{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:#34a853;border:2px solid #fff;box-shadow:0 0 0 1px #34a853;z-index:3}

/* Update line */
.uline{position:absolute;top:0;bottom:0;width:2px;background:#fbbc04;z-index:4;pointer-events:none}

/* Tooltip */
#tip{display:none;position:fixed;background:#1e293b;color:#fff;padding:8px 12px;border-radius:6px;font-size:11px;line-height:1.6;white-space:pre-line;z-index:999;pointer-events:none;max-width:320px;box-shadow:0 4px 12px rgba(0,0,0,.25)}

/* Summary */
.cards{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.card{flex:1;min-width:130px;padding:12px 14px;border-radius:8px;border:1px solid #e0e0e0;background:#fff}
.card b{font-size:24px;display:block}
.card small{font-size:11px;color:#666}
.c-green b{color:#34a853} .c-red b{color:#ea4335} .c-blue b{color:#4285f4}
</style>

// ====== RENDER ======
let zoom=1;const sc=document.getElementById('sc'),gt=document.getElementById('gt');
function tlW(){const a=sc.clientWidth-284;return zoom<=1?Math.max(a,500):a*zoom;}

function upT(){
  const m=UPD.match(/(\d+)-(\d+)-(\d+)\s+(\d+):(\d+)/);
  if(!m)return null;
  return T(+m[2],+m[3],+m[4],+m[5]);
}

function render(){
const w=tlW(),ppd=w/TD,ut=upT();
let h='';

// ALL rows: 3 cells only (col-name | col-who | single wide timeline cell)

// Header
h+='<thead><tr><th class="col-name">タスク名</th><th class="col-who">担当</th>';
h+=`<th class="tl-cell" style="position:relative;width:${w}px;min-width:${w}px;height:28px">`;
// Day labels as absolute-positioned divs inside single header cell
for(let d=0;d<TD;d++){
  const x=d*ppd;
  const isToday=DAYS[d].d.getTime()===NOW_DATE.getTime();
  const dayStyle=isToday?'border-left:2px solid #1a73e8;padding-left:4px;font-size:11px;font-weight:700;color:#1a73e8;background:rgba(26,115,232,.08);display:flex;align-items:center;white-space:nowrap;padding-right:4px':'border-left:2px solid #bbb;padding-left:4px;font-size:11px;font-weight:700;color:#555;display:flex;align-items:center;white-space:nowrap';
  const dayLabel=isToday?`${DAYS[d].l} ★今日`:DAYS[d].l;
  h+=`<div style="position:absolute;left:${x}px;top:0;bottom:0;${dayStyle}">${dayLabel}</div>`;
  // Sub-labels
  if(ppd>120){
    for(let hh=6;hh<24;hh+=6){
      const xh=x+(hh/24)*ppd;
      h+=`<div style="position:absolute;left:${xh}px;top:0;bottom:0;border-left:1px solid #ddd;padding-left:3px;font-size:9px;color:#aaa;display:flex;align-items:center">${hh}:00</div>`;
    }
  }
  if(ppd>400){
    for(let hh=0;hh<24;hh+=2){
      if(hh%6===0)continue;
      const xh=x+(hh/24)*ppd;
      h+=`<div style="position:absolute;left:${xh}px;top:0;bottom:0;border-left:1px solid #eee;padding-left:3px;font-size:9px;color:#ccc;display:flex;align-items:center">${hh}:00</div>`;
    }
  }
}
h+='</th></tr></thead><tbody>';

D.forEach(cat=>{
  // Category row: 3 cells
  h+=`<tr class="cat-row"><td class="col-name">${cat.cat}</td><td class="col-who"></td>`;
  h+=`<td class="tl-cell" style="width:${w}px;min-width:${w}px"></td></tr>`;

  cat.tasks.forEach(tk=>{
    const ic=tk.dn?'✅':tk.sg[tk.sg.length-1].t==='client'?'🔴':'🔵';
    const pc='pt-'+tk.p;
    h+=`<tr><td class="col-name">${tk.n} <span class="status">${ic}</span></td>`;
    h+=`<td class="col-who"><span class="ptag ${pc}">${tk.p}</span></td>`;
    h+=`<td class="tl-cell" style="position:relative;width:${w}px;min-width:${w}px">`;

    // Day gridlines
    for(let d=0;d<TD;d++){
      const x=d*ppd;
      h+=`<div class="gridline day" style="left:${x}px"></div>`;
      if(ppd>100){for(let hh=6;hh<24;hh+=6){h+=`<div class="gridline hour" style="left:${x+(hh/24)*ppd}px"></div>`;}}
    }

    // Bars
    tk.sg.forEach(sg=>{
      const x=(sg.s/TD)*w, bw=Math.max(((sg.e-sg.s)/TD)*w,3);
      const showP=bw>28;
      h+=`<div class="bar ${sg.t}" style="left:${x}px;width:${bw}px" data-t="${sg.tp}\n担当: ${sg.p}">${showP?`<span>${sg.p}</span>`:''}</div>`;
    });

    if(tk.dn&&tk.en!=null) h+=`<div class="edot" style="left:${(tk.en/TD)*w}px"></div>`;
    if(ut!=null) h+=`<div class="uline" style="left:${(ut/TD)*w}px"></div>`;

    h+='</td></tr>';
  });
});
h+='</tbody>';
gt.innerHTML=h;

// tooltip
const tip=document.getElementById('tip');
gt.querySelectorAll('.bar').forEach(b=>{
  b.onmouseenter=()=>{tip.textContent=b.dataset.t;tip.style.display='block';};
  b.onmousemove=e=>{tip.style.left=Math.min(e.clientX+12,innerWidth-330)+'px';tip.style.top=(e.clientY-48)+'px';};
  b.onmouseleave=()=>{tip.style.display='none';};
});

document.getElementById('ts').textContent=UPD;
// 日付範囲を表示
const sdl=`${SD.getMonth()+1}/${SD.getDate()}(${W[SD.getDay()]})`;
const edl=`${NOW_DATE.getMonth()+1}/${NOW_DATE.getDate()}(${W[NOW_DATE.getDay()]})`;
document.getElementById('dateRange').textContent=`${sdl}〜${edl}（過去30日）`;
document.getElementById('zl').textContent=zoom<=1?'フィット':Math.round(zoom*100)+'%';
}

function setZ(nz,px){
  const oz=zoom;zoom=Math.max(1,Math.min(20,nz));if(Math.abs(zoom-oz)<.001)return;
  const r=sc.getBoundingClientRect(),L=284;
  let piv;if(px!=null)piv=(px-r.left-L)+sc.scrollLeft;else{piv=sc.scrollLeft+(r.width-L)/2;}
  const ow=tlW();// recalc after zoom change? No, need old width
  // Actually we need old tlW before zoom changed. Hack: temporarily set back
  const saved=zoom;zoom=oz;const oldW=tlW();zoom=saved;
  const frac=oldW>0?piv/oldW:0;
  render();
  const newW=tlW();
  if(px!=null)sc.scrollLeft=frac*newW-(px-r.left-L);
  else sc.scrollLeft=frac*newW-(r.width-L)/2;
}

sc.addEventListener('wheel',e=>{
  const r=sc.getBoundingClientRect();if(e.clientX-r.left<284)return;
  e.preventDefault();setZ(zoom*(e.deltaY>0?.85:1.18),e.clientX);
},{passive:false});

document.getElementById('zi').onclick=()=>setZ(zoom*1.5,null);
document.getElementById('zo').onclick=()=>setZ(zoom/1.5,null);
document.getElementById('zf').onclick=()=>{zoom=1;render();sc.scrollLeft=0;};

// Summary
const all=D.flatMap(c=>c.tasks);
const dn=all.filter(t=>t.dn).length;
const cb=all.filter(t=>!t.dn&&t.sg[t.sg.length-1].t==='client').length;
const tb=all.filter(t=>!t.dn&&t.sg[t.sg.length-1].t==='team').length;
document.getElementById('cards').innerHTML=`
<div class="card c-green"><b>${dn}/${all.length}</b><small>完了タスク</small></div>
<div class="card c-red"><b>${cb}</b><small>根本さんボール</small></div>
<div class="card c-blue"><b>${tb}</b><small>こちらボール</small></div>`;

render();
addEventListener('resize',()=>{if(zoom<=1)render();});
</script>
